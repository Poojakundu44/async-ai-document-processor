# ============================================================
# APPLICATION
# ============================================================

spring:
  application:
    name: async-ai-document-processor

  # ============================================================
  # DATABASE (H2 for local development)
  # ============================================================
  datasource:
    url: jdbc:h2:mem:docprocessor
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true

  # Disable Flyway because migrations are PostgreSQL-specific
  flyway:
    enabled: false

  # ============================================================
  # KAFKA
  # ============================================================
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

      properties:
        enable.idempotence: true

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: document-processing-group
      auto-offset-reset: earliest

      properties:
        spring.json.trusted.packages: "com.asyncai.docprocessor.*"

  # ============================================================
  # REDIS
  # ============================================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ============================================================
  # FILE UPLOADS
  # ============================================================
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

# ============================================================
# LANGCHAIN4J / OPENAI
# ============================================================

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY:dummy-key}
      model-name: gpt-4-turbo-preview
      temperature: 0.3
      max-tokens: 2048

    embedding-model:
      api-key: ${OPENAI_API_KEY:dummy-key}
      model-name: text-embedding-3-small

# ============================================================
# ACTUATOR
# ============================================================

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator

  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

  metrics:
    export:
      prometheus:
        enabled: true

# ============================================================
# SWAGGER
# ============================================================

springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ============================================================
# LOGGING
# ============================================================

logging:
  level:
    com.asyncai.docprocessor: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ============================================================
# APP CONFIG
# ============================================================

app:
  kafka:
    topics:
      document-uploaded: document.uploaded
      document-processed: document.processed
      document-dlq: document.uploaded.DLQ

  storage:
    upload-dir: ./uploads

  processing:
    chunk-size: 512
    chunk-overlap: 50

  vector-store:
    dimensions: 1536
    table-name: document_embeddings