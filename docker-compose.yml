version: '3.8'

# ============================================================
# Docker Compose for local development
#
# WHY Docker Compose?
# Runs all infrastructure (DB, Kafka, Redis) locally without
# installing anything. Every developer gets the identical environment.
# "Works on my machine" is no longer an excuse.
#
# Usage:
#   docker-compose up -d        — start all services
#   docker-compose down         — stop all services
#   docker-compose logs -f kafka — tail kafka logs
# ============================================================

services:

  # ============================================================
  # POSTGRESQL + PGVECTOR
  # Using pgvector/pgvector image — it's PostgreSQL 16 with
  # the vector extension pre-installed.
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: docprocessor-postgres
    environment:
      POSTGRES_DB: docprocessor
      POSTGRES_USER: docuser
      POSTGRES_PASSWORD: docpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuser -d docprocessor"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docprocessor-network

  # ============================================================
  # REDIS
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: docprocessor-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docprocessor-network

  # ============================================================
  # ZOOKEEPER — Required by Kafka (manages cluster metadata)
  # In Kafka 3.x+ you can use KRaft mode (no Zookeeper) but
  # Confluent images still commonly bundle Zookeeper for stability.
  # ============================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: docprocessor-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - docprocessor-network

  # ============================================================
  # KAFKA
  # WHY two advertised listeners?
  # INTERNAL: used by other Docker containers (uses 'kafka' hostname)
  # EXTERNAL: used by your Spring Boot app running on your host machine
  #           (uses localhost:9092)
  # Without this, the app running on host can't reach Kafka in Docker.
  # ============================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: docprocessor-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168   # 7 days — standard for event replay
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - docprocessor-network

  # ============================================================
  # KAFKA UI — Excellent for debugging events during development
  # Access at http://localhost:8090
  # ============================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: docprocessor-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - docprocessor-network

  # ============================================================
  # PROMETHEUS — Scrapes metrics from /actuator/prometheus
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: docprocessor-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - docprocessor-network

  # ============================================================
  # GRAFANA — Visualizes Prometheus metrics
  # Access at http://localhost:3000 (admin/admin)
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: docprocessor-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - docprocessor-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  docprocessor-network:
    driver: bridge
